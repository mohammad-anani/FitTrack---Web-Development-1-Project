<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--css links-->
    <link rel="stylesheet" href="/Global/global.css" />

    <link rel="stylesheet" href="style.css" />

    <!--lato font link-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>FitTrack Login</title>
  </head>
  <body>
    <form class="login-form" id="form">
      <div class="logo-div">
        <img class="logo-img" src="../Pictures/AU LOGO.jpg" alt="Logo" />
      </div>
      <div class="login-credentials-div">
        <div class="input-container">
          <span class="label">Email:</span>
          <input
            type="text"
            id="email-input"
            class="email-input"
            placeholder="me@gmail.com"
          />
          <span id="email-validation" class="validation"></span>
        </div>
        <div class="input-container">
          <span class="label">Password:</span>
          <input
            type="password"
            id="password-input"
            class="password-input"
            placeholder="Password"
          />
          <span id="password-validation" class="validation"></span>
        </div>
      </div>
      <div class="remember-me-div">
        <input
          type="checkbox"
          class="remember-me-input"
          id="remember-me-input"
        />
        <label for="remember-me-input" class="remember-me-label"
          >Remember me</label
        >
      </div>
      <span id="login-validation" class="validation login-validation"></span>
      <div class="signin-button-div">
        <button type="submit" class="signin-button">Sign in</button>
      </div>
      <small class="copyright-small"
        >&copy;All rights reserved to FitTrack 2026</small
      >
    </form>
  </body>
  <script src="script.js" type="module"></script>
</html>
