<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--CSS links-->
    <link rel="stylesheet" href="/Global/global.css" />
    <link rel="stylesheet" href="/Global/form.css" />
    <link rel="stylesheet" href="style.css" />

    <title>FitTrack Login</title>
  </head>
  <body>
    <!--Form containing username, password and remember me-->
    <form>
      <div class="logo-div">
        <img class="logo-img" src="../Pictures/logo.png" alt="Logo" />
      </div>
      <div class="inputs-div">
        <div class="input-div">
          <span class="label">Email:</span>
          <input type="text" id="email-input" placeholder="me@gmail.com" />
          <span id="email-validation" class="validation"></span>
        </div>
        <div class="input-div">
          <span class="label">Password:</span>
          <input type="password" id="password-input" placeholder="Password" />
          <span id="password-validation" class="validation"></span>
        </div>
      </div>
      <div class="remember-me-div">
        <input type="checkbox" id="remember-me-input" />
        <label for="remember-me-input">Remember me</label>
      </div>
      <span id="login-validation" class="validation login"></span>
      <div class="signin-div">
        <button id="register" type="button" class="primary">Register</button>
        <button type="submit">Sign in</button>
      </div>
      <small class="copyright-small"
        >&copy;All rights reserved to FitTrack 2026</small
      >
    </form>
  </body>
  <script src="script.js" type="module" defer></script>
</html>
