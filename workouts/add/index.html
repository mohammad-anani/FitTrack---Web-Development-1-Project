<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--font awesome link-->
    <link rel="stylesheet" href="/fontawesome-free-6.7.2-web/css/all.min.css" />

    <!--CSS files-->
    <link rel="stylesheet" href="/Global/global.css" />
    <link rel="stylesheet" href="/Global/loadingSpinner.css" />
    <link rel="stylesheet" href="/Global/navbar.css" />
    <link rel="stylesheet" href="./style.css" />

    <title>Log Workout</title>
  </head>
  <body>
    <!--This aside is present in all pages(acts as a Layout) -->
    <aside>
      <div class="profile-div">
        <img src="../../Pictures/logo.png" alt="Logo" class="logo-img" />
        <span class="user-name-span"></span>
      </div>
      <nav>
        <div class="selection-div"></div>
        <a
          class="nav-link dashboard"
          href="/Dashboard"
          data-index="0"
          title="Dashboard"
        >
          <i class="fa-solid fa-chart-line"></i><span>Dashboard</span></a
        >
        <a
          href="/Workouts"
          title="Workouts"
          class="nav-link workouts"
          data-index="1"
        >
          <i class="fa-solid fa-dumbbell"></i>
          <span>Workouts</span>
        </a>
        <a
          href="/Workouts/add"
          title="Log Workout"
          class="nav-link log-workout hover-disabled"
          data-index="2"
        >
          <i class="fa-solid fa-person-running"></i>
          <span>Log Workout</span>
        </a>
        <a
          target="page"
          title="Goals"
          href="/Goals"
          class="nav-link goals"
          data-index="3"
        >
          <i class="fa-solid fa-bullseye"></i><span>Goals</span></a
        >
        <button title="Logout" class="nav-link logout" data-index="4">
          <i class="fa-solid fa-right-from-bracket"></i><span>Logout</span>
        </button>
      </nav>
    </aside>
    <!--Main Content-->
    <main>
      <h2>Log Workout</h2>
      <form id="workoutForm">
        <section class="inputs">
          <label for="name">Workout Name:</label>
          <div>
            <input required name="name" type="text" id="name" />
            <span id="nameValidation"></span>
          </div>
          <label for="type">Type:</label>
          <div>
            <select required name="type" id="type">
              <option value="" disabled selected>Select a type</option>
            </select>
            <span id="typeValidation"></span>
          </div>
          <label for="date">Date:</label>
          <div>
            <input required name="date" type="date" id="date" />
            <span id="dateValidation"></span>
          </div>
          <label for="duration">Duration (mins):</label>
          <div>
            <input
              required
              name="duration"
              type="number"
              id="duration"
              min="1"
            />
            <span id="durationValidation"></span>
          </div>
          <label for="calories">Calories:</label>
          <div>
            <input
              required
              name="calories"
              type="number"
              id="calories"
              min="1"
            />
            <span id="caloriesValidation"></span>
          </div>
        </section>
        <div>
          <button id="reset" type="reset" class="secondary">Clear</button>
          <button id="submit" type="submit" class="primary">Add Workout</button>
        </div>
      </form>
      <div class="loading-div"></div>
    </main>
  </body>
  <script src="script.js" type="module"></script>
</html>
