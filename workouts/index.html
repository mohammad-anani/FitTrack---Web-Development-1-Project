<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--font awesome link-->
    <link
      rel="stylesheet"
      href="../fontawesome-free-6.7.2-web/css/all.min.css"
    />

    <!--CSS files-->
    <link rel="stylesheet" href="/Global/global.css" />
    <link rel="stylesheet" href="/Global/loadingSpinner.css" />
    <link rel="stylesheet" href="/Global/navbar.css" />
    <link rel="stylesheet" href="./styles/workouts.css" />
    <link rel="stylesheet" href="./styles/pagination.css" />
    <link rel="stylesheet" href="./styles/action-bar.css" />
    <link rel="stylesheet" href="./styles/filter-modal.css" />

    <title>Workouts</title>
  </head>
  <body>
    <!--This aside is present in all pages(acts as a Layout) -->
    <aside>
      <div class="profile-div">
        <img src="../Pictures/logo.png" alt="Logo" class="logo-img" />
        <span class="user-name-span"></span>
      </div>
      <nav>
        <div class="selection-div"></div>
        <a
          class="nav-link dashboard"
          href="/Dashboard"
          data-index="0"
          title="Dashboard"
        >
          <i class="fa-solid fa-chart-line"></i><span>Dashboard</span></a
        >
        <a
          href="/Workouts"
          title="Workouts"
          class="nav-link workouts hover-disabled"
          data-index="1"
        >
          <i class="fa-solid fa-dumbbell"></i>
          <span>Workouts</span>
        </a>
        <a
          href="/Workouts/add"
          title="Log Workout"
          class="nav-link log-workout"
          data-index="2"
        >
          <i class="fa-solid fa-person-running"></i>
          <span>Log Workout</span>
        </a>
        <a
          target="page"
          title="Goals"
          href="/Goals"
          class="nav-link goals"
          data-index="3"
        >
          <i class="fa-solid fa-bullseye"></i><span>Goals</span></a
        >
        <button title="Logout" class="nav-link logout" data-index="4">
          <i class="fa-solid fa-right-from-bracket"></i><span>Logout</span>
        </button>
      </nav>
    </aside>
    <!--Main Content-->
    <main>
      <h2>Workouts</h2>
      <div class="workouts-table">
        <!--Bar containing filter, add, search-->
        <div class="action-bar">
          <button id="filter" class="secondary">
            <i class="fa-solid fa-filter"></i> <span> Filter </span>
          </button>
          <input
            type="text"
            id="name"
            placeholder="Search by name..."
            class="search-input"
          />
          <button id="add" class="primary">
            <i class="fa-solid fa-plus"></i>
            <span> Add </span>
          </button>
        </div>
        <!--Table of data-->
        <div class="table-div">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Type</th>
                <th>Calories</th>
                <th>Duration</th>
                <th>Date</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="workouts-tbody"></tbody>
            <tfoot>
              <tr>
                <td colspan="6"><span id="record-count"></span> records</td>
              </tr>
            </tfoot>
          </table>
        </div>
        <!--Pagination for splitting many rows into pages-->
        <div class="pagination">
          <button class="page-link back disabled">
            <i class="fa-solid fa-chevron-left"></i>
          </button>
          <button class="page-link number active">1</button>
          <button class="page-link number">2</button>
          <button class="page-link next">
            <i class="fa-solid fa-chevron-right"></i>
          </button>
        </div>
      </div>
      <!--blur used for modal-->
      <div class="blur"></div>
      <!--Modal that displays more filters -->
      <div class="modal">
        <i id="x-button" class="fa-solid fa-x"></i>
        <h2>Filters</h2>
        <div class="filters-div">
          <div class="labels-div">
            <label for="sort">Sort By</label>
            <label>Order</label>
            <label for="type">Type</label>
            <label>Date</label>
          </div>
          <div class="inputs-div">
            <select id="sort" name="sort">
              <option value="date">Date</option>
              <option value="calories">Calories</option>
              <option value="duration">Duration</option>
            </select>
            <div class="order-div">
              <input type="radio" value="asc" name="order" id="asc" />
              <label for="asc"> Ascending </label>
              <input type="radio" value="desc" checked name="order" id="desc" />
              <label for="desc"> Descending </label>
            </div>

            <select id="type" name="type">
              <option value="" disabled selected>Select a type</option>
            </select>
            <div class="date-div">
              <label for="from">From:</label>
              <input type="date" id="from" name="from" />
              <label for="to">To:</label>
              <input type="date" id="to" name="to" />
            </div>
          </div>
        </div>

        <div class="buttons-div">
          <button id="reset" class="secondary">Reset</button>
          <button id="apply" class="primary">Apply</button>
        </div>
      </div>
    </main>
    <div class="loading-div"></div>
  </body>
  <!--Scripts-->

  <script src="./scripts/table.js" type="module" defer></script>
</html>
